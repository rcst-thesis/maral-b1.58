model:
  name: maral-b1.58-125m
  version: 0.1.0

tokenizer:
  model_path: src/main/resources/models/maral.bpe.model
  vocab_size: 8000
  pad_id: 0
  unk_id: 1
  bos_id: 2
  eos_id: 3

architecture:
  d_model: 64
  n_heads: 4
  n_encoder_layers: 2
  n_decoder_layers: 2
  d_ffn: 168
  max_seq_len: 32
  dropout: 0.0
  eps: 1.0e-6
  rope_base: 10000

quantization:
  weight_bits: 1.58
  activation_bits: 8
  eps: 1.0e-8

training:
  batch_size: 1
  block_size: 32
  train_ratio: 0.9
  seed: 42
  max_epochs: 30
  learning_rate: 3.0e-4
  weight_decay: 0.1
  warmup_steps: 100
  grad_clip: 1.0
  grad_accum_steps: 4
  sample_every_n_epochs: 5

checkpoint:
  dir: checkpoints
  save_every_n_epochs: 1
  keep_last_n: 5
  resume_from: ""

data:
  corpus: src/main/resources/data/corpus.txt
  parallel: src/main/resources/data/en-tl.tsv
  source_lang: en
  target_lang: tl
